<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gieo Vần - Bảng Tin</title>
    <link rel="icon" type="image/png" href="/assets/images/logo.png?v=3" />
    <link
      href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/css/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="auth-status-container" id="authStatusArea" style="position: absolute; top: 20px; left: 20px; font-size: 13.5px; font-family: 'Lora', 'Inter', sans-serif; color: var(--text-muted);"></div>
      <button class="lang-toggle" id="langBtn" onclick="toggleLanguage()">
        EN
      </button>

      <header class="hero-banner">
        <div class="banner-overlay"></div>
        <div class="banner-content">
          <h1 id="ui-title" class="banner-title">Gieo Vần Thơ Ca</h1>
          <p id="ui-subtitle" class="banner-tagline">
            "Nơi những vần điệu tìm thấy sự đồng điệu của tâm hồn"
          </p>
        </div>
      </header>

      <nav class="nav-tabs" style="display: flex; gap: 20px; justify-content: center; margin-bottom: 30px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; font-family: 'Lora', 'Inter', sans-serif; font-size: 15px;">
        <a href="/" id="navTabWrite" style="color: var(--text-muted); font-weight: 500; text-decoration: none; padding-bottom: 5px; transition: color 0.3s ease;">Chắp Bút Làm Thơ</a>
        <a href="/feed" id="navTabFeed" style="color: var(--text-main); font-weight: 600; text-decoration: none; border-bottom: 2px solid var(--text-main); padding-bottom: 5px;">Bảng Tin Thơ Ca</a>
        <a href="/archive" id="navTabArchive" style="display: none; color: var(--text-muted); font-weight: 500; text-decoration: none; padding-bottom: 5px; transition: color 0.3s ease;">Góc của tôi</a>
      </nav>

      <div id="feedArea">
        <!-- Bảng tin thơ ca sẽ tự động tải ở đây -->
      </div>
    </div>

    <script>
      const API_URL = "http://localhost:8000/api";
      let currentLang = localStorage.getItem("preferred_lang") || "vi";

      const i18n = {
        vi: {
          title: "Gieo Vần Thơ Ca",
          subtitle: '"Nơi những vần điệu tìm thấy sự đồng điệu của tâm hồn"',
          loading: "Đang tải những vần thơ...",
          emptyFeed: "Chưa có bài thơ nào trên bảng tin.",
          errConn: "Không thể tải bảng tin thơ lúc này. Vui lòng kiểm tra lại kết nối.",
          toggleText: "EN",
          authorLabel: "Người gieo:",
          anonymous: "Ẩn danh",
          justNow: "Vừa xong",
          minsAgo: "phút trước",
          hoursAgo: "giờ trước",
          daysAgo: "ngày trước",
          tabWrite: "Chắp Bút Làm Thơ",
          tabFeed: "Bảng Tin Thơ Ca",
          tabArchive: "Góc của tôi",
          login: "Đăng nhập",
          register: "Đăng ký",
          logout: "Đăng xuất",
          welcome: "Chào",
          btnDelete: "Xóa",
          confirmDelete: "Bạn có chắc chắn muốn xóa vĩnh viễn bài thơ này?",
          errDeleteFail: "Xóa thất bại: ",
          errServerConn: "Lỗi kết nối server."
        },
        en: {
          title: "Poetry & Rhymes",
          subtitle: '"Where rhymes find the harmony of the soul"',
          loading: "Loading poems...",
          emptyFeed: "No poems on the feed yet.",
          errConn: "Could not load feed at this time. Please check your connection.",
          toggleText: "VI",
          authorLabel: "Poet:",
          anonymous: "Anonymous",
          justNow: "Just now",
          minsAgo: "minutes ago",
          hoursAgo: "hours ago",
          daysAgo: "days ago",
          tabWrite: "Compose Poetry",
          tabFeed: "Poetry Feed",
          tabArchive: "My Archive",
          login: "Log In",
          register: "Sign Up",
          logout: "Log Out",
          welcome: "Welcome",
          btnDelete: "Delete",
          confirmDelete: "Are you sure you want to permanently delete this poem?",
          errDeleteFail: "Delete failed: ",
          errServerConn: "Server connection error."
        }
      };

      function toggleLanguage() {
        currentLang = currentLang === "vi" ? "en" : "vi";
        localStorage.setItem("preferred_lang", currentLang);
        updateUI();
      }

      function updateUI() {
        const t = i18n[currentLang];
        document.getElementById("ui-title").innerText = t.title;
        document.getElementById("ui-subtitle").innerText = t.subtitle;
        document.getElementById("langBtn").innerText = t.toggleText;
        document.getElementById("navTabWrite").innerText = t.tabWrite;
        document.getElementById("navTabFeed").innerText = t.tabFeed;
        document.getElementById("navTabArchive").innerText = t.tabArchive;
        checkAuth();
        loadFeed();
      }

      function checkAuth() {
        const token = localStorage.getItem("access_token");
        const authStatusArea = document.getElementById("authStatusArea");
        const t = i18n[currentLang];
        const navTabArchive = document.getElementById("navTabArchive");
        
        if (token) {
          try {
            const payload = JSON.parse(atob(token.split('.')[1]));
            const username = payload.sub || "Thi sĩ";
            authStatusArea.innerHTML = `
              ${t.welcome}, <strong>${username}</strong> | 
              <a href="#" onclick="handleLogout(event)" style="color: var(--text-main); font-weight: 600; text-decoration: none; border-bottom: 1px dashed var(--text-main);">${t.logout}</a>
            `;
            if (navTabArchive) navTabArchive.style.display = "inline-block";
          } catch (e) {
            localStorage.removeItem("access_token");
            showGuestNav(authStatusArea);
          }
        } else {
          showGuestNav(authStatusArea);
        }
      }

      function showGuestNav(element) {
        const t = i18n[currentLang];
        element.innerHTML = `
          <a href="/login" style="color: var(--text-main); font-weight: 600; text-decoration: none;">${t.login}</a> | 
          <a href="/register" style="color: var(--text-main); font-weight: 600; text-decoration: none;">${t.register}</a>
        `;
        const navTabArchive = document.getElementById("navTabArchive");
        if (navTabArchive) navTabArchive.style.display = "none";
      }

      function handleLogout(event) {
        if (event) event.preventDefault();
        localStorage.removeItem("access_token");
        window.location.reload();
      }

      function formatRelativeTime(dateStr) {
        if (!dateStr) return "";
        const date = new Date(dateStr);
        const now = new Date();
        const diffMs = now - date;
        const diffSec = Math.floor(diffMs / 1000);
        const diffMin = Math.floor(diffSec / 60);
        const diffHr = Math.floor(diffMin / 60);
        const diffDay = Math.floor(diffHr / 24);

        const t = i18n[currentLang];

        if (diffSec < 60) return t.justNow;
        if (diffMin < 60) return `${diffMin} ${t.minsAgo}`;
        if (diffHr < 24) return `${diffHr} ${t.hoursAgo}`;
        if (diffDay < 7) return `${diffDay} ${t.daysAgo}`;
        
        return date.toLocaleDateString(currentLang === "vi" ? "vi-VN" : "en-US", {
          year: "numeric",
          month: "long",
          day: "numeric",
          hour: "2-digit",
          minute: "2-digit"
        });
      }

      async function loadFeed() {
        const feedArea = document.getElementById("feedArea");
        if (!feedArea) return;

        const t = i18n[currentLang];
        feedArea.innerHTML = `<p style="text-align: center; color: var(--text-muted); font-style: italic;">${t.loading}</p>`;

        const token = localStorage.getItem("access_token");
        let currentUsername = null;
        if (token) {
          try {
            const payload = JSON.parse(atob(token.split('.')[1]));
            currentUsername = payload.sub;
          } catch (e) {}
        }

        try {
          const res = await fetch(`${API_URL}/poems/feed`);
          if (!res.ok) throw new Error("HTTP error");
          const poems = await res.json();

          if (poems.length === 0) {
            feedArea.innerHTML = `<p style="text-align: center; color: var(--text-muted); font-style: italic;">${t.emptyFeed}</p>`;
            return;
          }

          let html = "";
          poems.forEach(poem => {
            const timeAgo = formatRelativeTime(poem.created_at);
            const safeContent = poem.content
              .replace(/&/g, "&amp;")
              .replace(/</g, "&lt;")
              .replace(/>/g, "&gt;")
              .replace(/"/g, "&quot;")
              .replace(/'/g, "&#039;");

            const authorName = poem.author === "Ẩn danh" ? t.anonymous : poem.author;
            const isOwner = currentUsername && poem.author && poem.author === currentUsername;

            let deleteBtn = "";
            if (isOwner) {
              deleteBtn = `
                <button 
                  onclick="deletePoem(event, ${poem.id})" 
                  style="position: absolute; top: 10px; right: 15px; background: none; border: none; color: var(--text-muted); font-size: 12px; font-family: 'Lora', serif; cursor: pointer; opacity: 0.6; transition: opacity 0.2s; padding: 5px; line-height: 1;"
                  onmouseover="this.style.opacity='1'"
                  onmouseout="this.style.opacity='0.6'"
                >${t.btnDelete}</button>
              `;
            }

            html += `
              <div class="poem-card" id="poem-card-${poem.id}" style="position: relative; background: #ffffff; padding: 20px ${isOwner ? '35px' : '20px'} 20px 20px; border-radius: 6px; border: 1px solid var(--border-color); border-left: 4px solid var(--text-muted); margin-bottom: 20px; box-shadow: 0 2px 8px rgba(139, 94, 60, 0.05); transition: opacity 0.3s ease, transform 0.3s ease;">
                ${deleteBtn}
                <p style="font-size: 16px; line-height: 1.8; color: var(--text-main); margin: 0 0 15px 0; white-space: pre-wrap; font-style: italic;">${safeContent}</p>
                <div style="display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: var(--text-muted); font-family: 'Lora', 'Inter', sans-serif;">
                  <span>${t.authorLabel} <strong>${authorName}</strong></span>
                  <span>${timeAgo}</span>
                </div>
              </div>
            `;
          });
          feedArea.innerHTML = html;
        } catch (err) {
          feedArea.innerHTML = `<p style="text-align: center; color: #d84315; font-style: italic;">${t.errConn}</p>`;
        }
      }

      async function deletePoem(event, poemId) {
        if (event) event.preventDefault();
        const t = i18n[currentLang];
        
        if (!confirm(t.confirmDelete)) {
          return;
        }

        const token = localStorage.getItem("access_token");
        try {
          const res = await fetch(`${API_URL}/poems/${poemId}`, {
            method: "DELETE",
            headers: {
              "Authorization": `Bearer ${token}`
            }
          });

          if (res.ok) {
            const card = document.getElementById(`poem-card-${poemId}`);
            if (card) {
              card.style.opacity = "0";
              card.style.transform = "scale(0.95)";
              setTimeout(() => {
                card.remove();
                const feedArea = document.getElementById("feedArea");
                if (feedArea && feedArea.querySelectorAll(".poem-card").length === 0) {
                  feedArea.innerHTML = `<p style="text-align: center; color: var(--text-muted); font-style: italic;">${t.emptyFeed}</p>`;
                }
              }, 300);
            }
          } else {
            const errData = await res.json().catch(() => ({}));
            alert(t.errDeleteFail + (errData.detail || "Error"));
          }
        } catch (err) {
          alert(t.errServerConn);
        }
      }

      // Initialize UI on load
      updateUI();
    </script>
  </body>
</html>
