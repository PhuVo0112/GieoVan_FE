<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gieo Vần - Kho Lưu Trữ</title>
    <link rel="icon" type="image/png" href="/assets/images/logo.png?v=3" />
    <link
      href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/css/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="auth-status-container" id="authStatusArea" style="position: absolute; top: 20px; left: 20px; font-size: 13.5px; font-family: 'Lora', 'Inter', sans-serif; color: var(--text-muted);"></div>
      <button class="lang-toggle" id="langBtn" onclick="toggleLanguage()">
        EN
      </button>

      <header class="hero-banner">
        <div class="banner-overlay"></div>
        <div class="banner-content">
          <h1 id="ui-title" class="banner-title">Gieo Vần Thơ Ca</h1>
          <p id="ui-subtitle" class="banner-tagline">
            "Nơi những vần điệu tìm thấy sự đồng điệu của tâm hồn"
          </p>
        </div>
      </header>

      <nav class="nav-tabs" style="display: flex; gap: 20px; justify-content: center; margin-bottom: 30px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; font-family: 'Lora', 'Inter', sans-serif; font-size: 15px;">
        <a href="/" id="navTabWrite" style="color: var(--text-muted); font-weight: 500; text-decoration: none; padding-bottom: 5px; transition: color 0.3s ease;">Chắp Bút Làm Thơ</a>
        <a href="/feed" id="navTabFeed" style="color: var(--text-muted); font-weight: 500; text-decoration: none; padding-bottom: 5px; transition: color 0.3s ease;">Bảng Tin Thơ Ca</a>
        <a href="/archive" id="navTabArchive" style="color: var(--text-main); font-weight: 600; text-decoration: none; border-bottom: 2px solid var(--text-main); padding-bottom: 5px;">Góc của tôi</a>
      </nav>

      <div id="archiveArea">
        <!-- Danh sách bài thơ cá nhân sẽ tải ở đây -->
      </div>
    </div>

    <script>
      const API_URL = "http://localhost:8000/api";
      let currentLang = localStorage.getItem("preferred_lang") || "vi";

      const i18n = {
        vi: {
          title: "Kho Lưu Trữ Thơ",
          subtitle: '"Nơi cất giữ những lời thì thầm của tâm hồn"',
          loading: "Đang tải những bài thơ của bạn...",
          emptyArchive: "Bạn chưa có bài thơ nào trong kho lưu trữ.",
          errConn: "Không thể tải kho lưu trữ thơ. Vui lòng kiểm tra lại kết nối.",
          toggleText: "EN",
          authorLabel: "Người gieo:",
          anonymous: "Ẩn danh",
          justNow: "Vừa xong",
          minsAgo: "phút trước",
          hoursAgo: "giờ trước",
          daysAgo: "ngày trước",
          tabWrite: "Chắp Bút Làm Thơ",
          tabFeed: "Bảng Tin Thơ Ca",
          tabArchive: "Góc của tôi",
          login: "Đăng nhập",
          register: "Đăng ký",
          logout: "Đăng xuất",
          welcome: "Chào",
          statusPrivate: "Riêng tư",
          statusPublic: "Đã trình làng",
          btnPublish: "Trình làng",
          btnPublishing: "Đang tải...",
          btnPublished: "✓ Trình làng thành công",
          errPublishFail: "Trình làng thất bại: ",
          errServerConn: "Lỗi kết nối server.",
          btnDelete: "Xóa",
          confirmDelete: "Bạn có chắc chắn muốn xóa vĩnh viễn bài thơ này?",
          errDeleteFail: "Xóa thất bại: "
        },
        en: {
          title: "My Archive",
          subtitle: '"Where the whispers of the soul are kept"',
          loading: "Loading your poems...",
          emptyArchive: "No poems in your archive yet.",
          errConn: "Could not load archive at this time. Please check connection.",
          toggleText: "VI",
          authorLabel: "Poet:",
          anonymous: "Anonymous",
          justNow: "Just now",
          minsAgo: "minutes ago",
          hoursAgo: "hours ago",
          daysAgo: "days ago",
          tabWrite: "Compose Poetry",
          tabFeed: "Poetry Feed",
          tabArchive: "My Archive",
          login: "Log In",
          register: "Sign Up",
          logout: "Log Out",
          welcome: "Welcome",
          statusPrivate: "Private",
          statusPublic: "Published",
          btnPublish: "Publish",
          btnPublishing: "Publishing...",
          btnPublished: "✓ Published",
          errPublishFail: "Publish failed: ",
          errServerConn: "Server connection error.",
          btnDelete: "Delete",
          confirmDelete: "Are you sure you want to permanently delete this poem?",
          errDeleteFail: "Delete failed: "
        }
      };

      function toggleLanguage() {
        currentLang = currentLang === "vi" ? "en" : "vi";
        localStorage.setItem("preferred_lang", currentLang);
        updateUI();
      }

      function updateUI() {
        const t = i18n[currentLang];
        document.getElementById("ui-title").innerText = t.title;
        document.getElementById("ui-subtitle").innerText = t.subtitle;
        document.getElementById("langBtn").innerText = t.toggleText;
        document.getElementById("navTabWrite").innerText = t.tabWrite;
        document.getElementById("navTabFeed").innerText = t.tabFeed;
        document.getElementById("navTabArchive").innerText = t.tabArchive;
        
        checkAuth();
        loadArchive();
      }

      function checkAuth() {
        const token = localStorage.getItem("access_token");
        const authStatusArea = document.getElementById("authStatusArea");
        const t = i18n[currentLang];
        
        if (token) {
          try {
            const payload = JSON.parse(atob(token.split('.')[1]));
            const username = payload.sub || "Thi sĩ";
            authStatusArea.innerHTML = `
              ${t.welcome}, <strong>${username}</strong> | 
              <a href="#" onclick="handleLogout(event)" style="color: var(--text-main); font-weight: 600; text-decoration: none; border-bottom: 1px dashed var(--text-main);">${t.logout}</a>
            `;
          } catch (e) {
            localStorage.removeItem("access_token");
            window.location.href = "/login";
          }
        } else {
          window.location.href = "/login";
        }
      }

      function handleLogout(event) {
        if (event) event.preventDefault();
        localStorage.removeItem("access_token");
        window.location.href = "/login";
      }

      function formatRelativeTime(dateStr) {
        if (!dateStr) return "";
        const date = new Date(dateStr);
        const now = new Date();
        const diffMs = now - date;
        const diffSec = Math.floor(diffMs / 1000);
        const diffMin = Math.floor(diffSec / 60);
        const diffHr = Math.floor(diffMin / 60);
        const diffDay = Math.floor(diffHr / 24);

        const t = i18n[currentLang];

        if (diffSec < 60) return t.justNow;
        if (diffMin < 60) return `${diffMin} ${t.minsAgo}`;
        if (diffHr < 24) return `${diffHr} ${t.hoursAgo}`;
        if (diffDay < 7) return `${diffDay} ${t.daysAgo}`;
        
        return date.toLocaleDateString(currentLang === "vi" ? "vi-VN" : "en-US", {
          year: "numeric",
          month: "long",
          day: "numeric",
          hour: "2-digit",
          minute: "2-digit"
        });
      }

      async function loadArchive() {
        const archiveArea = document.getElementById("archiveArea");
        if (!archiveArea) return;

        const t = i18n[currentLang];
        archiveArea.innerHTML = `<p style="text-align: center; color: var(--text-muted); font-style: italic;">${t.loading}</p>`;

        const token = localStorage.getItem("access_token");
        try {
          const res = await fetch(`${API_URL}/poems/my-poems`, {
            headers: {
              "Authorization": `Bearer ${token}`
            }
          });
          if (res.status === 401) {
            localStorage.removeItem("access_token");
            window.location.href = "/login";
            return;
          }
          if (!res.ok) throw new Error("HTTP error");
          const poems = await res.json();

          if (poems.length === 0) {
            archiveArea.innerHTML = `<p style="text-align: center; color: var(--text-muted); font-style: italic;">${t.emptyArchive}</p>`;
            return;
          }

          let html = "";
          poems.forEach(poem => {
            const timeAgo = formatRelativeTime(poem.created_at);
            const safeContent = poem.content
              .replace(/&/g, "&amp;")
              .replace(/</g, "&lt;")
              .replace(/>/g, "&gt;")
              .replace(/"/g, "&quot;")
              .replace(/'/g, "&#039;");

            const isPublic = poem.is_public;
            const badgeText = isPublic ? t.statusPublic : t.statusPrivate;
            const badgeBg = isPublic ? "rgba(141, 110, 99, 0.15)" : "rgba(216, 67, 21, 0.1)";
            const badgeColor = isPublic ? "var(--text-main)" : "#d84315";

            let actionBtn = "";
            if (!isPublic) {
              actionBtn = `
                <button 
                  id="pub-btn-${poem.id}" 
                  class="action-btn btn-primary" 
                  onclick="publishPoem(this, ${poem.id})" 
                  style="padding: 5px 12px; font-size: 13px; cursor: pointer; border-radius: 4px; border: 1px solid var(--text-main); font-family: 'Lora', serif; font-weight: 500; transition: all 0.3s ease;"
                >${t.btnPublish}</button>
              `;
            }

            html += `
              <div class="poem-card" id="poem-card-${poem.id}" style="position: relative; background: #ffffff; padding: 20px 35px 20px 20px; border-radius: 6px; border: 1px solid var(--border-color); border-left: 4px solid var(--text-muted); margin-bottom: 20px; box-shadow: 0 2px 8px rgba(139, 94, 60, 0.05); transition: opacity 0.3s ease, transform 0.3s ease;">
                <button 
                  onclick="deletePoem(event, ${poem.id})" 
                  style="position: absolute; top: 10px; right: 15px; background: none; border: none; color: var(--text-muted); font-size: 12px; font-family: 'Lora', serif; cursor: pointer; opacity: 0.6; transition: opacity 0.2s; padding: 5px; line-height: 1;"
                  onmouseover="this.style.opacity='1'"
                  onmouseout="this.style.opacity='0.6'"
                >${t.btnDelete}</button>
                <p style="font-size: 16px; line-height: 1.8; color: var(--text-main); margin: 0 0 15px 0; white-space: pre-wrap; font-style: italic;">${safeContent}</p>
                <div style="display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: var(--text-muted); font-family: 'Lora', 'Inter', sans-serif; gap: 10px; flex-wrap: wrap;">
                  <div style="display: flex; gap: 10px; align-items: center;">
                    <span id="badge-${poem.id}" style="background: ${badgeBg}; color: ${badgeColor}; border: 1px solid var(--border-color); padding: 3px 8px; border-radius: 4px; font-size: 11.5px; font-weight: 600; font-family: 'Lora', sans-serif;">${badgeText}</span>
                    <span style="font-size: 12px; color: var(--text-muted);">${timeAgo}</span>
                  </div>
                  <div id="action-area-${poem.id}">
                    ${actionBtn}
                  </div>
                </div>
              </div>
            `;
          });
          archiveArea.innerHTML = html;
        } catch (err) {
          archiveArea.innerHTML = `<p style="text-align: center; color: #d84315; font-style: italic;">${t.errConn}</p>`;
        }
      }

      async function publishPoem(btn, poemId) {
        const t = i18n[currentLang];
        const originalText = btn.innerText;
        btn.innerText = t.btnPublishing;
        btn.disabled = true;
        btn.style.opacity = "0.6";

        const token = localStorage.getItem("access_token");
        try {
          const res = await fetch(`${API_URL}/poems/${poemId}/publish`, {
            method: "PUT",
            headers: {
              "Authorization": `Bearer ${token}`
            }
          });

          if (res.ok) {
            // Update badge content & color without reload
            const badge = document.getElementById(`badge-${poemId}`);
            if (badge) {
              badge.innerText = t.statusPublic;
              badge.style.background = "rgba(141, 110, 99, 0.15)";
              badge.style.color = "var(--text-main)";
            }

            // Remove button
            const actionArea = document.getElementById(`action-area-${poemId}`);
            if (actionArea) {
              actionArea.innerHTML = `<span style="color: #2e7d32; font-weight: 600; font-size: 13px; font-family: 'Lora', sans-serif;">${t.btnPublished}</span>`;
            }
          } else {
            const errData = await res.json().catch(() => ({}));
            btn.innerText = originalText;
            btn.disabled = false;
            btn.style.opacity = "1";
            alert(t.errPublishFail + (errData.detail || "Error"));
          }
        } catch (err) {
          btn.innerText = originalText;
          btn.disabled = false;
          btn.style.opacity = "1";
          alert(t.errServerConn);
        }
      }

      async function deletePoem(event, poemId) {
        if (event) event.preventDefault();
        const t = i18n[currentLang];
        
        if (!confirm(t.confirmDelete)) {
          return;
        }

        const token = localStorage.getItem("access_token");
        try {
          const res = await fetch(`${API_URL}/poems/${poemId}`, {
            method: "DELETE",
            headers: {
              "Authorization": `Bearer ${token}`
            }
          });

          if (res.ok) {
            const card = document.getElementById(`poem-card-${poemId}`);
            if (card) {
              card.style.opacity = "0";
              card.style.transform = "scale(0.95)";
              setTimeout(() => {
                card.remove();
                const archiveArea = document.getElementById("archiveArea");
                if (archiveArea && archiveArea.querySelectorAll(".poem-card").length === 0) {
                  archiveArea.innerHTML = `<p style="text-align: center; color: var(--text-muted); font-style: italic;">${t.emptyArchive}</p>`;
                }
              }, 300);
            }
          } else {
            const errData = await res.json().catch(() => ({}));
            alert(t.errDeleteFail + (errData.detail || "Error"));
          }
        } catch (err) {
          alert(t.errServerConn);
        }
      }

      // Initialize UI on load
      updateUI();
    </script>
  </body>
</html>
