<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gieo Vần - Đăng Ký</title>
    <link rel="icon" type="image/png" href="/assets/images/logo.png?v=3" />
    <link
      href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/css/style.css" />
    <style>
      .form-group {
        margin-bottom: 20px;
        text-align: left;
      }
      .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: var(--text-main);
      }
      .form-control {
        width: 100%;
        padding: 12px;
        background: #faf8f5;
        color: var(--text-main);
        border: 1px solid var(--border-color);
        border-radius: 6px;
        font-size: 15px;
        font-family: "Lora", "Inter", sans-serif;
        box-sizing: border-box;
        outline: none;
        transition: all 0.3s ease;
      }
      .form-control:focus {
        border-color: var(--text-muted);
        background: #ffffff;
        box-shadow: 0 0 0 3px rgba(141, 110, 99, 0.1);
      }
      .auth-links {
        margin-top: 20px;
        text-align: center;
        font-size: 14px;
      }
      .auth-links a {
        color: var(--text-main);
        text-decoration: underline;
        font-weight: 600;
        transition: color 0.3s ease;
      }
      .auth-links a:hover {
        color: var(--text-muted);
      }
      .alert {
        padding: 12px;
        border-radius: 6px;
        margin-bottom: 20px;
        font-size: 14px;
        display: none;
      }
      .alert-danger {
        background-color: #fbe9e7;
        color: #c62828;
        border: 1px solid #ffccbc;
      }
      .alert-success {
        background-color: #e8f5e9;
        color: #2e7d32;
        border: 1px solid #c8e6c9;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <button class="lang-toggle" id="langBtn" onclick="toggleLanguage()">
        EN
      </button>
      <header class="hero-banner">
        <div class="banner-content">
          <h1 id="ui-title" class="banner-title">Gieo Vần Thơ Ca</h1>
          <p id="ui-subtitle" class="banner-tagline">Đăng ký tài khoản mới</p>
        </div>
      </header>

      <div id="errorAlert" class="alert alert-danger"></div>
      <div id="successAlert" class="alert alert-success"></div>

      <form id="registerForm" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label id="labelUsername" for="username">Tên tài khoản</label>
          <input
            type="text"
            id="username"
            class="form-control"
            required
            placeholder="Nhập tên tài khoản..."
          />
        </div>
        <div class="form-group">
          <label id="labelEmail" for="email">Địa chỉ Email</label>
          <input
            type="email"
            id="email"
            class="form-control"
            required
            placeholder="Nhập email của bạn..."
          />
        </div>
        <div class="form-group">
          <label id="labelPassword" for="password">Mật khẩu</label>
          <input
            type="password"
            id="password"
            class="form-control"
            required
            placeholder="Nhập mật khẩu từ 6 ký tự..."
            minlength="6"
          />
        </div>

        <button type="submit" id="ui-btn-submit" class="action-btn btn-primary" style="width: 100%; margin-top: 10px;">
          Đăng Ký
        </button>
      </form>

      <div id="authLinksContainer" class="auth-links">
        Đã có tài khoản? <a href="/login">Đăng nhập ngay</a>
      </div>
    </div>

    <script>
      let currentLang = localStorage.getItem("preferred_lang") || "vi";

      const i18n = {
        vi: {
          title: "Gieo Vần Thơ Ca",
          subtitle: "Đăng ký tài khoản mới",
          labelUsername: "Tên tài khoản",
          placeholderUsername: "Nhập tên tài khoản...",
          labelEmail: "Địa chỉ Email",
          placeholderEmail: "Nhập email của bạn...",
          labelPassword: "Mật khẩu",
          placeholderPassword: "Nhập mật khẩu từ 6 ký tự...",
          btnSubmit: "Đăng Ký",
          linkPrompt: "Đã có tài khoản? ",
          linkAction: "Đăng nhập ngay",
          successMsg: "Đăng ký thành công! Đang chuyển hướng sang Đăng nhập...",
          defaultErrorMsg: "Đăng ký thất bại. Vui lòng thử lại.",
          connErrorMsg: "Lỗi kết nối máy chủ. Vui lòng thử lại sau.",
          toggleText: "EN"
        },
        en: {
          title: "Poetry & Rhymes",
          subtitle: "Register New Account",
          labelUsername: "Username",
          placeholderUsername: "Enter your username...",
          labelEmail: "Email Address",
          placeholderEmail: "Enter your email...",
          labelPassword: "Password",
          placeholderPassword: "Enter password (min 6 chars)...",
          btnSubmit: "Sign Up",
          linkPrompt: "Already have an account? ",
          linkAction: "Log in now",
          successMsg: "Registered successfully! Redirecting to login...",
          defaultErrorMsg: "Registration failed. Please try again.",
          connErrorMsg: "Server connection error. Please try again later.",
          toggleText: "VI"
        }
      };

      function toggleLanguage() {
        currentLang = currentLang === "vi" ? "en" : "vi";
        localStorage.setItem("preferred_lang", currentLang);
        updateUI();
      }

      function updateUI() {
        const t = i18n[currentLang];
        document.getElementById("ui-title").innerText = t.title;
        document.getElementById("ui-subtitle").innerText = t.subtitle;
        document.getElementById("labelUsername").innerText = t.labelUsername;
        document.getElementById("username").placeholder = t.placeholderUsername;
        document.getElementById("labelEmail").innerText = t.labelEmail;
        document.getElementById("email").placeholder = t.placeholderEmail;
        document.getElementById("labelPassword").innerText = t.labelPassword;
        document.getElementById("password").placeholder = t.placeholderPassword;
        document.getElementById("ui-btn-submit").innerText = t.btnSubmit;
        document.getElementById("langBtn").innerText = t.toggleText;
        document.getElementById("authLinksContainer").innerHTML = `${t.linkPrompt}<a href="/login">${t.linkAction}</a>`;
      }

      async function handleRegister(event) {
        event.preventDefault();
        const username = document.getElementById("username").value.trim();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const t = i18n[currentLang];

        const errorAlert = document.getElementById("errorAlert");
        const successAlert = document.getElementById("successAlert");

        errorAlert.style.display = "none";
        successAlert.style.display = "none";

        try {
          const response = await fetch("/api/register", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ username, email, password }),
          });

          const data = await response.json();

          if (response.ok) {
            successAlert.innerText = t.successMsg;
            successAlert.style.display = "block";
            setTimeout(() => {
              window.location.href = "/login";
            }, 1500);
          } else {
            errorAlert.innerText = data.detail || t.defaultErrorMsg;
            errorAlert.style.display = "block";
          }
        } catch (err) {
          errorAlert.innerText = t.connErrorMsg;
          errorAlert.style.display = "block";
        }
      }

      // Initialize UI on load
      updateUI();
    </script>
  </body>
</html>
